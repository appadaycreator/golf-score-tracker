<h1>📋 使い方</h1><h2>記録タブ</h2><p>ラウンド後に日付・コース・ホール別スコアを入力して保存します。ホール別入力が面倒な場合は「合計のみ」モードも使えます。</p><h2>履歴タブ</h2><p>過去のラウンドを日付・スコア順で一覧表示。CSVエクスポートでバックアップが可能です。</p><h2>分析タブ</h2><p>3ラウンド以上記録するとハンデキャップ推定・スコア推移グラフ・詳細統計が表示されます。</p><h2>データ保存先</h2><p>データはブラウザのLocalStorageに保存されます。機種変更・ブラウザリセット前にCSVエクスポートを推奨します。</p>
